spring.application.name=verg

# Postgres Settings
spring.datasource.url=jdbc:postgresql://localhost:5433/verg_db
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.datasource.username=verg_user
spring.datasource.password=verg_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Settings
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.cacheTtl=3600
search.result.redis.ttl = 36000


# Elastic Search Settings
elasticsearch.host=localhost
elasticsearch.port=9200
elasticsearch.username=elastic
elasticsearch.password=changeme

#Application Specific
search.string.max.regex.length=50
elastic.required.field.sample.json.path=
elastic.required.field.livestock.json.path=/EsFieldsmapping/esLiveStockRequiredFields.json
